<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <title>AI Studio v8.0 - 跨端满配版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --safe-top: max(1.5rem, env(safe-area-inset-top));
            --safe-bottom: env(safe-area-inset-bottom);
            color-scheme: dark;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #09090b; /* PC端外部背景更深 */
            color: #f8fafc;
            overscroll-behavior-y: contain; 
            -webkit-tap-highlight-color: transparent; 
        }

        /* 保证在 PC 上的沙盒视图具有边框阴影 */
        .app-sandbox {
            background-color: #131315;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .header-bg {
            background: rgba(19, 19, 21, 0.9);
            backdrop-filter: blur(20px);
            padding-top: var(--safe-top);
        }

        #mainResult {
            max-height: calc(100vh - 300px - var(--safe-top));
            object-fit: contain;
        }

        .sidebar-transition {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }

        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .save-hint { animation: bounce-subtle 2s infinite; }
    </style>
</head>
<!-- 【修复2】：使整个应用在PC上居中并限制最大宽度，变成沙盒应用 -->
<body class="h-screen w-full flex justify-center">

    <div class="app-sandbox w-full max-w-4xl h-full flex flex-col relative border-x border-white/5 overflow-hidden">

        <input type="file" id="globalFileInput" class="hidden" accept="image/*" multiple onchange="handleFiles(this)">

        <!-- 将 fixed 改为 absolute 以限制在沙盒内 -->
        <div id="dropdownOverlay" onclick="closeAllDropdowns()" class="hidden absolute inset-0 z-40"></div>

        <header class="header-bg border-b border-white/5 shrink-0 z-40">
            <div class="h-14 flex items-center justify-between px-4">
                <div class="flex items-center gap-2">
                    <div class="w-7 h-7 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20">
                        <i data-lucide="sparkles" class="w-4 h-4 text-white"></i>
                    </div>
                    <span class="font-bold text-base tracking-tight flex items-center gap-2">
                        AI Studio 
                        <span class="text-[10px] font-normal text-slate-400 border border-slate-700 px-1.5 py-0.5 rounded bg-slate-800/50">v8.0</span>
                    </span>
                </div>
                <div class="flex items-center gap-1">
                    <button onclick="toggleSidebar('historySidebar')" class="p-2 text-slate-400 active:bg-white/10 rounded-full transition-colors">
                        <i data-lucide="history" class="w-5 h-5"></i>
                    </button>
                    <button onclick="toggleConfig()" class="p-2 text-slate-400 active:bg-white/10 rounded-full transition-colors">
                        <i data-lucide="settings" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-1 flex flex-col overflow-hidden relative">
            <div id="sidebarOverlay" onclick="closeAllSidebars()" class="hidden absolute inset-0 bg-black/80 backdrop-blur-md z-[55] transition-opacity opacity-0"></div>

            <div class="flex-1 flex flex-col p-4 relative overflow-hidden">
                <div id="emptyState" class="m-auto flex flex-col items-center opacity-20 pointer-events-none">
                    <i data-lucide="ghost" class="w-16 h-16 mb-4"></i>
                    <p class="text-[10px] font-bold uppercase tracking-[0.2em]">等待灵感降临</p>
                </div>

                <!-- 【修复6】：带进度条的渲染日志界面 -->
                <div id="loadingState" class="hidden m-auto flex flex-col items-center w-full max-w-xs px-2">
                    <div class="relative w-14 h-14 mb-6">
                        <div class="absolute inset-0 border-4 border-blue-500/20 rounded-full"></div>
                        <div class="absolute inset-0 border-4 border-blue-500 rounded-full border-t-transparent animate-spin"></div>
                        <i data-lucide="sparkles" class="absolute inset-0 m-auto w-5 h-5 text-blue-400 animate-pulse"></i>
                    </div>
                    <div class="w-full">
                        <div class="flex justify-between items-end text-[11px] text-slate-400 mb-2">
                            <span id="logText">正在连接服务器...</span>
                            <span id="progressPercent" class="font-mono text-blue-400 font-bold">0%</span>
                        </div>
                        <div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden shadow-inner">
                            <div id="progressBar" class="h-full bg-blue-500 w-0 transition-all duration-[800ms] ease-out relative">
                                <div class="absolute top-0 bottom-0 right-0 w-10 bg-gradient-to-r from-transparent to-white/30"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="resultContainer" class="hidden m-auto w-full flex flex-col items-center animate-in fade-in zoom-in duration-300">
                    <div class="relative w-full max-w-lg bg-[#1e1e22] rounded-2xl p-1 border border-white/5 shadow-2xl overflow-hidden">
                        <button onclick="closeCanvas()" class="absolute top-3 right-3 z-30 p-2 bg-black/50 hover:bg-black/80 text-white rounded-full backdrop-blur-md border border-white/10 active:scale-90 transition shadow-lg">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>

                        <div id="mainResultGrid" class="w-full max-h-[60vh] overflow-y-auto custom-scrollbar flex flex-wrap justify-center gap-1.5 p-1">
                            <!-- JS 注入图片 -->
                        </div>

                        <div id="compareOverlay" class="absolute inset-0 opacity-0 pointer-events-none transition-opacity duration-200 z-20">
                            <img id="compareImg" src="" class="w-full h-full object-contain rounded-xl bg-black">
                            <div class="absolute top-3 left-3 bg-blue-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase border border-white/20">参考原图</div>
                        </div>
                    </div>

                    <div class="mt-6 flex items-center gap-3 w-full max-w-xs">
                        <button id="compareBtn" class="hidden flex-1 flex items-center justify-center gap-2 py-3.5 bg-[#2a2a30] text-slate-300 rounded-2xl active:scale-95 transition select-none" ontouchstart="startCompare()" ontouchend="stopCompare()" onmousedown="startCompare()" onmouseup="stopCompare()">
                            <i data-lucide="scan-eye" class="w-5 h-5 text-blue-400"></i>
                            <span class="text-xs font-bold">按住对比</span>
                        </button>
                        <button onclick="openSaveModal()" class="flex-[1.5] flex items-center justify-center gap-2 py-3.5 bg-white text-black rounded-2xl font-bold active:scale-95 transition shadow-lg">
                            <i data-lucide="arrow-down-to-line" class="w-5 h-5"></i>
                            <span id="saveBtnText">保存画作</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 【修复4】：真正的瀑布流历史记录 columns-2 -->
            <aside id="historySidebar" class="absolute inset-y-0 right-0 w-[280px] bg-[#131315] z-[60] transition-transform translate-x-full border-l border-white/10 flex flex-col shadow-2xl">
                <div class="pt-[calc(var(--safe-top)+1rem)] px-4 pb-4 border-b border-white/5 flex justify-between items-center bg-white/5">
                    <button onclick="closeAllSidebars()" class="p-2 text-slate-400 active:text-white rounded-lg"><i data-lucide="chevron-right" class="w-6 h-6"></i></button>
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">创作记录</span>
                    <button onclick="clearHistory()" class="p-2 text-slate-600 active:text-red-500 rounded-lg"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>
                <!-- 移除了 aspect-square，引入 columns-2 -->
                <div id="historyList" class="flex-1 overflow-y-auto p-3 columns-2 gap-2 space-y-2 custom-scrollbar"></div>
            </aside>
        </main>

        <div class="safe-bottom bg-[#131315] px-4 py-2 w-full shrink-0 z-50 pb-[calc(var(--safe-bottom)+0.5rem)]">
            <div class="bg-[#202024] rounded-3xl p-2.5 flex flex-col transition-all border border-white/5 shadow-sm">
                
                <div id="uploadPreviewsContainer" class="hidden relative self-start ml-2 mt-1 mb-1 flex flex-wrap gap-3"></div>

                <div class="relative w-full">
                    <div id="mentionMenu" class="hidden absolute w-36 bg-[#2a2a30]/95 backdrop-blur-xl border border-white/10 rounded-xl shadow-[0_0_20px_rgba(0,0,0,0.5)] flex flex-col overflow-hidden z-[70] origin-bottom-left animate-in fade-in zoom-in-95 duration-100"></div>
                    
                    <textarea id="promptInput" onkeydown="handleEnter(event)" oninput="checkMention(this)" rows="1" class="w-full bg-transparent border-none px-3 py-2 text-[15px] text-slate-100 outline-none resize-none max-h-32 custom-scrollbar placeholder:text-slate-500 leading-normal" placeholder="发送指令至 AI Studio... (输入 @ 引用图片)"></textarea>
                </div>

                <div class="flex items-center justify-between px-1 mt-1">
                    <!-- 左侧：附件 + 模式 -->
                    <div class="flex items-center gap-1">
                        <button onclick="document.getElementById('globalFileInput').click()" class="p-2 text-slate-400 active:text-white rounded-full active:bg-white/10 transition">
                            <i data-lucide="plus" class="w-6 h-6"></i>
                        </button>

                        <div class="relative">
                            <button onclick="toggleDropdown(event, 'modeDropdown')" class="px-2.5 py-1.5 bg-[#2f2f35] rounded-full flex items-center justify-center active:bg-white/10 transition border border-white/5 gap-1.5">
                                <i id="modeIcon" data-lucide="wand-2" class="w-3.5 h-3.5 text-slate-300"></i>
                                <span id="modeDisplay" class="text-[11px] font-medium text-slate-300">生成</span>
                            </button>
                            <!-- 【修复5】：添加详细说明释义 -->
                            <div id="modeDropdown" class="hidden absolute bottom-full mb-3 left-0 w-44 bg-[#2a2a30]/95 backdrop-blur-xl border border-white/10 rounded-2xl shadow-[0_0_20px_rgba(0,0,0,0.5)] flex flex-col overflow-hidden z-[60] origin-bottom-left animate-in fade-in zoom-in-95 duration-100">
                                <button onclick="setMode('generations')" class="px-4 py-3 text-left hover:bg-white/5 active:bg-white/10 transition flex items-center gap-3">
                                    <i data-lucide="wand-2" class="w-4 h-4 text-blue-400"></i>
                                    <div>
                                        <div class="text-xs font-bold text-slate-200">生成模式</div>
                                        <div class="text-[9px] text-slate-400 mt-0.5">支持纯文生图、多图融合</div>
                                    </div>
                                </button>
                                <div class="h-[1px] bg-white/5"></div>
                                <button onclick="setMode('edits')" class="px-4 py-3 text-left hover:bg-white/5 active:bg-white/10 transition flex items-center gap-3">
                                    <i data-lucide="crop" class="w-4 h-4 text-purple-400"></i>
                                    <div>
                                        <div class="text-xs font-bold text-slate-200">编辑模式</div>
                                        <div class="text-[9px] text-slate-400 mt-0.5">需原图，局部重绘与修改</div>
                                    </div>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 右侧：清晰度 + 批次 + 比例 + 发送 -->
                    <div class="flex items-center gap-1.5">
                        
                        <!-- 【修复1】：清晰度选择器 1K/2K/4K -->
                        <div class="relative">
                            <button onclick="toggleDropdown(event, 'qualityDropdown')" class="px-2 py-1.5 bg-[#2f2f35] rounded-full flex items-center justify-center active:bg-white/10 transition border border-white/5">
                                <span id="qualityDisplay" class="text-[11px] font-bold text-blue-400">1K</span>
                            </button>
                            <div id="qualityDropdown" class="hidden absolute bottom-full mb-3 left-1/2 -translate-x-1/2 w-24 bg-[#2a2a30]/95 backdrop-blur-xl border border-white/10 rounded-2xl shadow-[0_0_20px_rgba(0,0,0,0.5)] flex flex-col overflow-hidden z-[60] origin-bottom animate-in fade-in zoom-in-95 duration-100">
                                <button onclick="setQuality('1K')" class="py-3 text-xs font-medium text-slate-200 hover:bg-white/5 active:bg-white/10 transition text-center">1K (标清)</button>
                                <div class="h-[1px] bg-white/5"></div>
                                <button onclick="setQuality('2K')" class="py-3 text-xs font-medium text-slate-200 hover:bg-white/5 active:bg-white/10 transition text-center">2K (高清)</button>
                                <div class="h-[1px] bg-white/5"></div>
                                <button onclick="setQuality('4K')" class="py-3 text-xs font-medium text-slate-200 hover:bg-white/5 active:bg-white/10 transition text-center">4K (超清)</button>
                            </div>
                        </div>

                        <!-- 批次 -->
                        <div class="relative">
                            <button onclick="toggleDropdown(event, 'batchDropdown')" class="px-2.5 py-1.5 bg-[#2f2f35] rounded-full flex items-center justify-center active:bg-white/10 transition border border-white/5">
                                <span id="batchDisplay" class="text-[11px] font-medium text-slate-300">1张</span>
                            </button>
                            <div id="batchDropdown" class="hidden absolute bottom-full mb-3 left-1/2 -translate-x-1/2 w-20 bg-[#2a2a30]/95 backdrop-blur-xl border border-white/10 rounded-2xl shadow-[0_0_20px_rgba(0,0,0,0.5)] flex flex-col overflow-hidden z-[60] origin-bottom animate-in fade-in zoom-in-95 duration-100">
                                <button onclick="setBatch(1)" class="py-3 text-xs font-medium text-slate-200 hover:bg-white/5 active:bg-white/10 transition text-center">1张</button>
                                <div class="h-[1px] bg-white/5"></div>
                                <button onclick="setBatch(2)" class="py-3 text-xs font-medium text-slate-200 hover:bg-white/5 active:bg-white/10 transition text-center">2张</button>
                                <div class="h-[1px] bg-white/5"></div>
                                <button onclick="setBatch(4)" class="py-3 text-xs font-medium text-slate-200 hover:bg-white/5 active:bg-white/10 transition text-center">4张</button>
                            </div>
                        </div>

                        <!-- 比例 -->
                        <div class="relative">
                            <button onclick="toggleDropdown(event, 'ratioDropdown')" class="px-2.5 py-1.5 bg-[#2f2f35] rounded-full flex items-center justify-center active:bg-white/10 transition border border-white/5">
                                <span id="ratioDisplay" class="text-[11px] font-medium text-slate-300">自动</span>
                            </button>
                            <div id="ratioDropdown" class="hidden absolute bottom-full mb-3 right-0 w-24 bg-[#2a2a30]/95 backdrop-blur-xl border border-white/10 rounded-2xl shadow-[0_0_20px_rgba(0,0,0,0.5)] flex flex-col overflow-hidden z-[60] origin-bottom-right animate-in fade-in zoom-in-95 duration-100">
                                <button onclick="setRatio('auto')" class="py-3 text-xs font-medium text-slate-200 hover:bg-white/5 active:bg-white/10 transition text-center">自动</button>
                                <div class="h-[1px] bg-white/5"></div>
                                <button onclick="setRatio('1:1')" class="py-3 text-xs font-medium text-slate-200 hover:bg-white/5 active:bg-white/10 transition text-center tracking-widest">1:1</button>
                                <div class="h-[1px] bg-white/5"></div>
                                <button onclick="setRatio('3:2')" class="py-3 text-xs font-medium text-slate-200 hover:bg-white/5 active:bg-white/10 transition text-center tracking-widest">3:2</button>
                                <div class="h-[1px] bg-white/5"></div>
                                <button onclick="setRatio('2:3')" class="py-3 text-xs font-medium text-slate-200 hover:bg-white/5 active:bg-white/10 transition text-center tracking-widest">2:3</button>
                                <div class="h-[1px] bg-white/5"></div>
                                <button onclick="setRatio('16:9')" class="py-3 text-xs font-medium text-slate-200 hover:bg-white/5 active:bg-white/10 transition text-center tracking-widest">16:9</button>
                                <div class="h-[1px] bg-white/5"></div>
                                <button onclick="setRatio('9:16')" class="py-3 text-xs font-medium text-slate-200 hover:bg-white/5 active:bg-white/10 transition text-center tracking-widest">9:16</button>
                            </div>
                        </div>

                        <button onclick="generate()" class="w-9 h-9 ml-0.5 bg-[#2f2f35] active:bg-blue-600 rounded-full flex items-center justify-center transition-all active:scale-90 text-slate-300 active:text-white">
                            <i data-lucide="send" class="w-4 h-4 ml-0.5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 历史记录独立预览弹窗 -->
        <div id="historyViewModal" class="hidden absolute inset-0 z-[120] flex flex-col items-center justify-center bg-black/95 p-4 animate-in fade-in duration-200">
            <button onclick="closeHistoryView()" class="absolute top-[var(--safe-top)] right-4 p-3 bg-white/10 hover:bg-white/20 rounded-full text-white backdrop-blur-md active:scale-90 transition z-10 border border-white/20">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <img id="historyViewImg" src="" class="max-w-full max-h-[55vh] rounded-2xl shadow-2xl mb-4 object-contain">
            
            <div class="w-full max-w-xs flex flex-col gap-2">
                <div class="bg-[#1e1e22]/80 p-3 rounded-xl backdrop-blur-md border border-white/10 max-h-20 overflow-y-auto custom-scrollbar mb-1">
                    <p id="historyViewPrompt" class="text-[11px] text-slate-300 leading-relaxed"></p>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="reuseHistoryPromptOnly()" class="flex-1 flex items-center justify-center gap-2 py-3 bg-[#2a2a30] text-slate-300 rounded-xl font-bold active:scale-95 transition text-xs border border-white/5">
                        <i data-lucide="type" class="w-4 h-4"></i>仅提取提示词
                    </button>
                    <button id="reuseImageBtn" onclick="reuseHistoryImageOnly()" class="flex-1 flex items-center justify-center gap-2 py-3 bg-[#2a2a30] text-slate-300 rounded-xl font-bold active:scale-95 transition text-xs border border-white/5">
                        <i data-lucide="image" class="w-4 h-4"></i>作为参考图
                    </button>
                </div>

                <button id="reuseAllBtn" onclick="reuseHistoryAll()" class="w-full flex items-center justify-center gap-2 py-3.5 bg-blue-600 text-white rounded-xl font-bold active:scale-95 transition shadow-lg shadow-blue-500/20 text-sm mt-1">
                    <i data-lucide="copy-plus" class="w-5 h-5"></i>完整套用 (图 + 词)
                </button>
            </div>
        </div>

        <!-- 保存弹窗 (防跨域兜底) -->
        <div id="saveModal" class="hidden absolute inset-0 z-[100] flex flex-col items-center justify-center bg-black/95 p-6 animate-in fade-in duration-200">
            <button onclick="closeSaveModal()" class="absolute top-[var(--safe-top)] right-6 p-3 bg-white/10 rounded-full text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
            <div class="save-hint mb-4 flex flex-col items-center text-center">
                <i data-lucide="mouse-pointer-2" class="w-8 h-8 text-blue-500 mb-2"></i>
                <h3 class="text-white font-bold">保存您的杰作</h3>
                <p class="text-[10px] text-slate-400 mt-1">手机端可长按下方图片保存</p>
            </div>
            <div class="relative max-w-full max-h-[60vh] bg-[#1e1e22] p-1 rounded-2xl shadow-2xl border border-white/10">
                <img id="savePreview" src="" class="max-w-full max-h-[55vh] rounded-xl object-contain">
            </div>
            
            <!-- 【修复3】：为 PC 端增加直观的新窗口打开按钮，无视CORS -->
            <button onclick="window.open(document.getElementById('savePreview').src, '_blank')" class="mt-6 w-full max-w-xs flex items-center justify-center gap-2 py-4 bg-slate-800 text-slate-200 rounded-2xl font-bold active:scale-95 transition border border-white/10">
                <i data-lucide="external-link" class="w-5 h-5"></i>
                🌐 在新标签页打开原图 (用于右键另存)
            </button>
        </div>

        <!-- 配置界面 -->
        <div id="configModal" class="hidden absolute inset-0 z-[100] flex items-center justify-center bg-black/95 p-6">
            <div class="w-full max-w-sm bg-[#1e1e22] border border-white/10 rounded-3xl p-6 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-bold">接口配置</h2>
                    <button onclick="toggleConfig()" class="text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <div class="space-y-4">
                    <input id="apiUrl" type="text" placeholder="API 地址 (例: https://ai.xxx.com)" class="w-full bg-[#131315] border border-white/5 rounded-xl p-4 text-sm outline-none text-white">
                    <input id="apiKey" type="password" placeholder="API Key (sk-...)" class="w-full bg-[#131315] border border-white/5 rounded-xl p-4 text-sm outline-none text-white">
                    
                    <div class="flex gap-2 pt-2">
                        <button id="verifyBtn" onclick="verifyApiKey()" class="flex-1 flex justify-center items-center gap-2 bg-[#2a2a30] py-4 rounded-xl font-bold active:scale-95 transition border border-white/5">
                            <i data-lucide="shield-check" class="w-4 h-4 text-blue-400"></i> 测试接口
                        </button>
                        <button onclick="saveConfig()" class="flex-1 btn-primary py-4 rounded-xl font-bold active:scale-95 transition">
                            保存配置
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="toast" class="absolute top-24 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-5 py-2.5 rounded-full shadow-2xl text-[10px] font-bold transition-all transform -translate-y-20 opacity-0 z-[110] pointer-events-none"></div>

    </div> <!-- 沙盒容器结束 -->

    <script>
        lucide.createIcons();

        let currentMode = 'generations';
        let currentRatio = 'auto';
        let currentBatch = 1;
        let currentQuality = '1K';
        
        let uploadedImagesBase64 = []; 
        const MAX_UPLOADS = 4;
        
        let historyQueue = [];
        let currentHistoryPromptStr = '';
        let currentResultUrls = [];
        let mentionStartIndex = -1;
        let progressInterval = null;

        function toggleDropdown(event, id) {
            event.stopPropagation();
            const el = document.getElementById(id);
            const isHidden = el.classList.contains('hidden');
            closeAllDropdowns();
            if (isHidden) {
                el.classList.remove('hidden');
                document.getElementById('dropdownOverlay').classList.remove('hidden');
            }
        }

        function closeAllDropdowns() {

        // ================= @快捷菜单交互 =================
        function getCaretCoordinates(element, position) {
            const div = document.createElement('div');
            const style = window.getComputedStyle(element);
            
            div.style.position = 'absolute';
            div.style.top = '0';
            div.style.left = '-9999px';
            div.style.whiteSpace = 'pre-wrap';
            div.style.wordWrap = 'break-word';
            
            const properties = [
                'boxSizing', 'width', 'height', 'overflowX', 'overflowY',
                'borderTopWidth', 'borderRightWidth', 'borderBottomWidth', 'borderLeftWidth',
                'paddingTop', 'paddingRight', 'paddingBottom', 'paddingLeft',
                'fontStyle', 'fontVariant', 'fontWeight', 'fontStretch', 'fontSize', 'lineHeight', 'fontFamily',
                'textAlign', 'textTransform', 'textIndent', 'textDecoration', 'letterSpacing', 'wordSpacing'
            ];
            properties.forEach(prop => div.style[prop] = style[prop]);

            div.textContent = element.value.substring(0, position);
            const span = document.createElement('span');
            span.textContent = element.value.substring(position) || '.';
            div.appendChild(span);
            document.body.appendChild(div);

            const coordinates = {
                top: span.offsetTop + parseInt(style.borderTopWidth || 0),
                left: span.offsetLeft + parseInt(style.borderLeftWidth || 0)
            };
            
            document.body.removeChild(div);
            return coordinates;
        }

        function checkMention(el) {
            saveCurrentState(); 
            autoResize(el);

            const cursorPosition = el.selectionStart;
            const textBeforeCursor = el.value.substring(0, cursorPosition);
            
            const match = textBeforeCursor.match(/(?:^|\s)@([^\s]*)$/);
            
            if (match) {
                mentionStartIndex = cursorPosition - match[1].length - 1;
                const coords = getCaretCoordinates(el, mentionStartIndex);
                const menu = document.getElementById('mentionMenu');
                
                const maxLeft = el.offsetWidth - 150; 
                menu.style.left = Math.min(coords.left, maxLeft) + 'px';
                menu.style.bottom = (el.offsetHeight - (coords.top - el.scrollTop) + 8) + 'px';
                
                showMentionMenu();
            } else {
                hideMentionMenu();
                mentionStartIndex = -1;
            }
        }

        function dataURLtoBlob(dataurl) {
            let arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
                bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
            while(n--){
                u8arr[n] = bstr.charCodeAt(n);
            }
            return new Blob([u8arr], {type:mime});
        }

        async function fetchImageAsBase64(url) {
            const response = await fetch(url);
            const blob = await response.blob();
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        function handleFiles(input) {
            const files = Array.from(input.files);
            if (files.length === 0) return;

            if (uploadedImagesBase64.length + files.length > MAX_UPLOADS) {
                showToast(`⚠️ 最多允许 ${MAX_UPLOADS} 张图，已截断多余图片`);
            }
            
            const allowedCount = MAX_UPLOADS - uploadedImagesBase64.length;
            const filesToAdd = files.slice(0, allowedCount);

            filesToAdd.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    uploadedImagesBase64.push(e.target.result);
                    renderUploadPreviews();
                };
                reader.readAsDataURL(file);
            });
            input.value = ''; 
        }

            text = text.replace(deleteRegex, '');
            
            text = text.replace(/@图片(\d+)\b/g, (match, p1) => {
                const num = parseInt(p1, 10);
                if (num > deletedNum) {

        // ================= 核心双擎生成逻辑 (带分辨率映射) =================
        async function generate() {
            const promptInputEl = document.getElementById('promptInput');
            const prompt = promptInputEl.value.trim();
            
            let apiUrlInput = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');
            let apiKeyInput = document.getElementById('apiKey').value.trim();

            const baseUrl = apiUrlInput || localStorage.getItem('ai_base_url') || 'https://ai.comfly.chat';
            const apiKey = apiKeyInput || localStorage.getItem('ai_api_key');

            if (!prompt) return showToast("请输入画作描述");
            
            if (!apiKey) {
                showToast("⚠️ 请先配置 API Key");
                return toggleConfig();
            }

            localStorage.setItem('ai_base_url', baseUrl);
            localStorage.setItem('ai_api_key', apiKey);

            if (currentMode === 'edits' && uploadedImagesBase64.length === 0) {
                return showToast("⚠️ 图像编辑模式必须先上传参考图");
            }

            promptInputEl.blur(); 

            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('resultContainer').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            
            // 启动进度条
            startFakeProgress();

            // 【修复1】：完整严格的 1K/2K/4K 分辨率映射表
            const sizeMap = {
                "1K": { "auto": "auto", "1:1": "1024x1024", "3:2": "1536x1024", "2:3": "1024x1536", "16:9": "1536x864", "9:16": "864x1536" },
                "2K": { "auto": "auto", "1:1": "2048x2048", "3:2": "2304x1536", "2:3": "1536x2304", "16:9": "2048x1152", "9:16": "1152x2048" },
                "4K": { "auto": "auto", "1:1": "2880x2880", "3:2": "3456x2304", "2:3": "2304x3456", "16:9": "3840x2160", "9:16": "2160x3840" }
            };

            const mappedSize = sizeMap[currentQuality]?.[currentRatio] || "1024x1024";

            try {
                const endpoint = currentMode === 'edits' ? '/v1/images/edits' : '/v1/images/generations';
                
                const makeRequest = async () => {
                    let options = {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${apiKey}` }
                    };

                    if (currentMode === 'edits') {
                        const formData = new FormData();
                        formData.append('model', 'gpt-image-2');
                        formData.append('prompt', prompt);
                        formData.append('size', mappedSize);
                        
                        uploadedImagesBase64.forEach((base64Str, index) => {
                            const blob = dataURLtoBlob(base64Str);
                            formData.append('image', blob, `reference_${index}.png`);
                        });
                        options.body = formData;
                    } else {
                        options.headers['Content-Type'] = 'application/json';
                        const payload = {
                            model: "gpt-image-2",
                            prompt: prompt,
                            size: mappedSize
                        };
                        if (uploadedImagesBase64.length > 0) {
                            payload.image = uploadedImagesBase64; 
                        }
                        options.body = JSON.stringify(payload);
                    }

                    const response = await fetch(`${baseUrl}${endpoint}`, options);
                    const result = await response.json();
                    if (!response.ok) throw new Error(result.error?.message || "生成请求失败");
                    return result;
                };

                const promises = [];
                for (let i = 0; i < currentBatch; i++) {
                    promises.push(makeRequest());
                }

                const results = await Promise.all(promises);
                
                let urls = [];
                results.forEach(res => {
                    if (res.data && Array.isArray(res.data)) {
                        res.data.forEach(item => { if (item.url) urls.push(item.url); });
                    } else if (res.url) {
                        urls.push(res.url);
                    }
                });

                if (urls.length === 0) throw new Error("API 未返回有效图片");

                completeProgress();
                currentResultUrls = urls;
                
                const grid = document.getElementById('mainResultGrid');
                grid.innerHTML = '';
                
                if (urls.length === 1) {
                    grid.className = "flex justify-center w-full";
                    grid.innerHTML = `<img src="${urls[0]}" class="max-w-full max-h-[60vh] object-contain rounded-xl shadow-lg">`;
                } else {
                    grid.className = `grid grid-cols-2 gap-1.5 w-full max-h-[60vh] overflow-y-auto custom-scrollbar p-1`;
                    urls.forEach(u => {
                        grid.innerHTML += `<div class="relative group aspect-square rounded-xl overflow-hidden border border-white/5">
                            <img src="${u}" class="w-full h-full object-cover shadow-inner">
                        </div>`;
                    });
                }

                setTimeout(() => {
                    document.getElementById('loadingState').classList.add('hidden');
                    document.getElementById('resultContainer').classList.remove('hidden');
                    
                    document.getElementById('saveBtnText').innerText = urls.length > 1 ? `保存全部(${urls.length})` : "保存画作";
                    
                    if (uploadedImagesBase64.length === 1 && urls.length === 1) {
                        document.getElementById('compareBtn').classList.remove('hidden');
                        document.getElementById('compareImg').src = uploadedImagesBase64[0];
                    } else {
                        document.getElementById('compareBtn').classList.add('hidden');
                    }
                }, 300);

                urls.forEach(u => addToHistory(u, prompt));

            } catch (err) {
                if(progressInterval) clearInterval(progressInterval);
                showToast(err.message);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
            }
        }

        function toggleSidebar(id) {
            const el = document.getElementById(id);
            const overlay = document.getElementById('sidebarOverlay');
            const isOpen = !el.classList.contains('translate-x-full');
            if (isOpen) {
                el.classList.add('translate-x-full');
                overlay.classList.add('hidden');
                overlay.classList.remove('opacity-100');
            } else {
                el.classList.remove('translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.add('opacity-100'), 10);
            }
        }

        function closeAllSidebars() {
            document.getElementById('historySidebar').classList.add('translate-x-full');
            const overlay = document.getElementById('sidebarOverlay');
            overlay.classList.remove('opacity-100');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('-translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('-translate-y-20', 'opacity-0'), 3000);
        }

        function saveConfig() {
            localStorage.setItem('ai_base_url', document.getElementById('apiUrl').value.trim().replace(/\/$/, ''));
            localStorage.setItem('ai_api_key', document.getElementById('apiKey').value.trim());
            toggleConfig();
            showToast("✅ 配置已保存");
        }

        function toggleConfig() { document.getElementById('configModal').classList.toggle('hidden'); }
        function clearHistory() { if(confirm("清除所有记录？")){ historyQueue=[]; localStorage.removeItem('ai_history'); renderHistory(); } }
    </script>
</body>
</html>
